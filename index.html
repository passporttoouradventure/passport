<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6f4631">
  <meta name="description" content="Isabella and Kevin's Sedona wedding passport — August 15, 2026.">
  <meta property="og:title" content="Passport to Our Adventure">
  <meta property="og:description" content="Join Isabella & Kevin in Sedona, Arizona — August 15, 2026.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/page-01.png">
  <title>Passport to Our Adventure — Isabella & Kevin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preload" href="assets/images/page-01.png" as="image">
  <style>
    :root{--espresso:#5f3b2b;--terracotta:#a96843;--sand:#eadbc8;--ivory:#fffaf2;--ink:#4b3529;--shadow:rgba(45,26,17,.28)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#d8c7b2}
    body{font-family:Georgia,"Times New Roman",serif;color:var(--ink);overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;z-index:-2;background:linear-gradient(145deg,rgba(78,49,35,.68),rgba(183,111,68,.4)),url("assets/images/page-06.png") center/cover no-repeat;filter:blur(3px);transform:scale(1.03)}
    body::after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 50% 22%,rgba(255,250,242,.30),rgba(55,34,24,.36) 75%)}
    button,a{font:inherit}
    .intro{position:fixed;inset:0;z-index:1000;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#5e3929,#a56541);transition:opacity .7s,visibility .7s}
    .intro.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .intro-card{width:min(92vw,560px);padding:clamp(34px,7vw,62px) 26px;text-align:center;color:white;border:1px solid rgba(255,255,255,.38);border-radius:24px;background:rgba(255,255,255,.08);box-shadow:0 25px 70px rgba(0,0,0,.34);backdrop-filter:blur(8px)}
    .monogram{width:82px;height:82px;margin:0 auto 22px;border:1px solid rgba(255,255,255,.65);border-radius:50%;display:grid;place-items:center;font-size:28px;letter-spacing:2px}
    .eyebrow{text-transform:uppercase;letter-spacing:.22em;font:600 11px/1.4 Arial,sans-serif;opacity:.9}
    h1{font-size:clamp(36px,8vw,58px);font-weight:400;line-height:1.02;margin:12px 0 18px}
    .intro p{font-size:clamp(17px,4vw,21px);line-height:1.55;margin:0 0 28px}
    .start{border:1px solid rgba(255,255,255,.88);border-radius:999px;padding:14px 25px;background:var(--ivory);color:var(--espresso);cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.2)}
    .site{min-height:100vh;display:grid;place-items:center;padding:max(16px,env(safe-area-inset-top)) 12px max(18px,env(safe-area-inset-bottom))}
    .shell{width:min(94vw,560px)}
    .titlebar{text-align:center;color:white;text-shadow:0 2px 10px rgba(0,0,0,.35);margin:0 0 12px}
    .titlebar strong{font-size:16px;font-weight:400;letter-spacing:.05em}.titlebar span{display:block;font:11px Arial,sans-serif;letter-spacing:.18em;text-transform:uppercase;margin-top:4px;opacity:.88}
    .book{position:relative;width:100%;aspect-ratio:3.5/5;perspective:2200px;touch-action:pan-y;filter:drop-shadow(0 22px 24px rgba(29,18,13,.34))}
    .page{position:absolute;inset:0;transform-origin:left center;transform-style:preserve-3d;transition:transform .78s cubic-bezier(.2,.75,.2,1),filter .5s;border-radius:13px;overflow:hidden;background:var(--ivory);backface-visibility:hidden;-webkit-backface-visibility:hidden}
    .page::after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(93,59,43,.12),inset 13px 0 22px rgba(81,48,32,.08)}
    .page img{width:100%;height:100%;display:block;object-fit:contain;background:var(--ivory);user-select:none;-webkit-user-drag:none}
    .page.flipped{transform:rotateY(-180deg);pointer-events:none;filter:brightness(.86)}
    .page.turning{will-change:transform}
    .edge{position:absolute;top:0;bottom:0;width:18%;z-index:50;border:0;background:transparent;cursor:pointer}.edge.prev{left:0}.edge.next{right:0}
    .map-link{position:absolute;left:88%;transform:translate(-50%,-50%);z-index:70;display:inline-flex;align-items:center;justify-content:center;min-width:62px;padding:6px 10px;border:1px solid #c7a27d;border-radius:999px;background:rgba(255,250,242,.97);color:#75462f;text-decoration:none;font:600 9px/1 Arial,sans-serif;letter-spacing:.02em;box-shadow:0 3px 8px rgba(0,0,0,.14);transition:transform .2s,background .2s}
    .map-link:hover,.map-link:focus-visible{background:#f2dfcd;transform:translate(-50%,-50%) scale(1.06);outline:none}
    .controls{display:flex;justify-content:center;align-items:center;gap:9px;margin-top:17px;flex-wrap:wrap}
    .control{border:1px solid rgba(255,255,255,.48);border-radius:999px;padding:10px 15px;background:rgba(88,52,36,.88);color:white;cursor:pointer;box-shadow:0 5px 16px rgba(0,0,0,.18);backdrop-filter:blur(5px)}
    .control:disabled{opacity:.4;cursor:not-allowed}.control.secondary{background:rgba(255,250,242,.92);color:var(--espresso)}
    .status{text-align:center;color:white;margin-top:11px;font:12px Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,.5)}
    .dots{display:flex;justify-content:center;gap:6px;margin-top:8px}.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.38)}.dot.active{background:white;transform:scale(1.25)}
    .hint{text-align:center;color:rgba(255,255,255,.82);font:11px Arial,sans-serif;margin-top:8px}
    @media (max-width:600px){.site{align-items:start;padding-top:12px}.shell{width:min(98vw,500px)}.titlebar{margin-bottom:8px}.controls{margin-top:12px}.control{padding:9px 13px;font-size:13px}.map-link{min-width:52px;padding:5px 7px;font-size:8px}.hint{display:none}}
    @media (prefers-reduced-motion:reduce){.page,.intro{transition:none}}
  </style>
</head>
<body>
  <section class="intro" id="intro" aria-label="Wedding invitation introduction">
    <div class="intro-card">
      <div class="monogram">I·K</div>
      <div class="eyebrow">Sedona · Arizona</div>
      <h1>Passport to<br>Our Adventure</h1>
      <p>Isabella &amp; Kevin<br>August 15, 2026</p>
      <button class="start" id="startBtn" type="button">Begin Your Journey</button>
    </div>
  </section>

  <main class="site">
    <div class="shell">
      <div class="titlebar"><strong>Isabella &amp; Kevin</strong><span>Sedona Wedding Passport</span></div>
      <div class="book" id="book" aria-label="Interactive wedding passport">
        <button class="edge prev" id="edgePrev" aria-label="Previous page"></button>
        <button class="edge next" id="edgeNext" aria-label="Next page"></button>
      </div>
      <div class="controls">
        <button class="control" id="prevBtn" type="button">← Previous</button>
        <button class="control secondary" id="musicBtn" type="button">♪ Music</button>
        <button class="control" id="nextBtn" type="button">Next →</button>
      </div>
      <div class="status" id="status" aria-live="polite"></div>
      <div class="dots" id="dots" aria-hidden="true"></div>
      <div class="hint">Swipe, tap the page edges, or use your arrow keys.</div>
    </div>
  </main>

  <audio id="music" loop preload="metadata"><source src="assets/audio/our-song.mp3" type="audio/mpeg"></audio>
<script>
const pageCount=10;
const book=document.getElementById('book');
const maps=[
 {top:30,url:'https://www.google.com/maps/search/?api=1&query=204+N+State+Route+89A%2C+Sedona%2C+AZ',label:'Broken Arrow Jeep Tour'},
 {top:54,url:'https://www.google.com/maps/search/?api=1&query=254+N+AZ-89A%2C+Sedona%2C+AZ',label:'89 Agave Cantina'},
 {top:69,url:'https://www.google.com/maps/search/?api=1&query=Munds+Wagon+Trailhead%2C+Sedona%2C+AZ',label:'Munds Wagon ceremony'},
 {top:81,url:'https://www.google.com/maps/search/?api=1&query=45+Bonita+Ct%2C+Sedona%2C+AZ',label:'Wedding dinner'}
];
for(let i=1;i<=pageCount;i++){
 const page=document.createElement('section'); page.className='page'; page.dataset.index=i-1;
 const img=document.createElement('img'); img.src=`assets/images/page-${String(i).padStart(2,'0')}.png`; img.alt=`Wedding passport page ${i}`; img.loading=i<3?'eager':'lazy'; img.decoding='async'; page.appendChild(img);
 if(i===5){maps.forEach(m=>{const a=document.createElement('a');a.className='map-link';a.style.top=m.top+'%';a.href=m.url;a.target='_blank';a.rel='noopener';a.textContent='View Map';a.setAttribute('aria-label','View map for '+m.label);page.appendChild(a)})}
 book.insertBefore(page,document.getElementById('edgePrev'));
}
const pages=[...document.querySelectorAll('.page')];
const dots=document.getElementById('dots');
for(let i=0;i<pageCount;i++){const d=document.createElement('span');d.className='dot';dots.appendChild(d)}
let index=0;
function render(){pages.forEach((p,i)=>{p.classList.toggle('flipped',i<index);p.style.zIndex=i<index?i:pageCount-i});document.getElementById('prevBtn').disabled=index===0;document.getElementById('nextBtn').disabled=index===pageCount;document.getElementById('status').textContent=index===pageCount?'End of invitation':`Page ${index+1} of ${pageCount}`;[...dots.children].forEach((d,i)=>d.classList.toggle('active',i===Math.min(index,pageCount-1)))}
function next(){if(index<pageCount){index++;render()}}
function prev(){if(index>0){index--;render()}}
document.getElementById('nextBtn').onclick=next;document.getElementById('prevBtn').onclick=prev;document.getElementById('edgeNext').onclick=next;document.getElementById('edgePrev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev()});
let x0=null;book.addEventListener('touchstart',e=>x0=e.changedTouches[0].clientX,{passive:true});book.addEventListener('touchend',e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>45)(dx<0?next:prev)();x0=null},{passive:true});
const music=document.getElementById('music'),musicBtn=document.getElementById('musicBtn');music.volume=.34;
async function toggleMusic(){try{if(music.paused){await music.play();musicBtn.textContent='❚❚ Pause'}else{music.pause();musicBtn.textContent='♪ Music'}}catch{musicBtn.textContent='Tap to Play'}}
musicBtn.onclick=toggleMusic;
document.getElementById('startBtn').onclick=async()=>{document.getElementById('intro').classList.add('hidden');try{await music.play();musicBtn.textContent='❚❚ Pause'}catch{musicBtn.textContent='♪ Music'}};
render();
</script>
</body>
</html>
